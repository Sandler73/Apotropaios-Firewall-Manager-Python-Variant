# ==============================================================================
# Apotropaios - Firewall Manager Configuration (Python Variant)
# File:        conf/apotropaios.conf
# Description: Default configuration values for the framework.
#              Copy to /etc/apotropaios/apotropaios.conf for system-wide config.
#              Uses INI format compatible with Python's configparser module.
# Version:     1.6.2
# ==============================================================================

[logging]
# Log level: trace, debug, info, warning, error, critical
log_level = warning
# Log directory (relative to base dir)
log_dir = data/logs
# Maximum log file size in MB before rotation
log_max_size_mb = 100
# Maximum number of rotated log files to retain
log_max_files = 10

[firewall]
# Default firewall backend (auto-detected if empty)
# Valid values: firewalld, iptables, nftables, ufw, ipset
default_backend =

[backup]
# Backup directory (relative to base dir)
backup_dir = data/backups
# Maximum number of backup archives to retain
backup_max_retained = 20

[rules]
# Rules directory (relative to base dir)
rules_dir = data/rules
# Default duration type for new rules: permanent or temporary
rule_default_duration = permanent

[security]
# Lock acquisition timeout in seconds
lock_timeout = 30
